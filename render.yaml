# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: beat-battle
    runtime: python
    buildCommand: apt-get update -y && apt-get install -y --no-install-recommends ffmpeg && pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: COOKUP_JWT_SECRET
        generateValue: true
      # Neon: Project → Connection string → URI (include ?sslmode=require).
      - key: DATABASE_URL
        sync: false
