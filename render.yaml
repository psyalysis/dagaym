# https://render.com/docs/blueprint-spec
#
# Set DATABASE_URL on the Web Service to your Render Postgres *Internal Database URL*
# (Environment tab, or link the Postgres database to inject it). Do not commit credentials.
# Free web services cannot use persistent disks; use managed Postgres for durable data.
services:
  - type: web
    name: beat-battle
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: COOKUP_JWT_SECRET
        generateValue: true
